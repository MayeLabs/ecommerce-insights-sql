services:
  db:
    image: postgres:latest
    container_name: mypostgres
    restart: always
    environment:
      POSTGRES_USER: usuario_anban
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: anban
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
